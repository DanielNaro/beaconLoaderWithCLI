services:
  localhost:
    image: alpine:latest
    command: sleep infinity
    environment:
      BEACON_DB_PORT: ${BEACON_DB_PORT}
      KEYCLOAK_DB_PORT: ${KEYCLOAK_DB_PORT}
      # Beacon Postgres credentials (used by postgres, hasura and beacon-loader)
      BEACON_DB_NAME: ${BEACON_DB_NAME}
      BEACON_DB_USER: ${BEACON_DB_USER}
      BEACON_DB_PASSWORD: ${BEACON_DB_PASSWORD}
      # Keycloak Postgres credentials (used by postgres-keycloak and keycloak)
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      # Hasura admin secret
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET}
      # Service ports
      KEYCLOAK_PORT: ${KEYCLOAK_PORT}
      GRAPHQL_ENGINE_PORT: ${GRAPHQL_ENGINE_PORT}
      DATA_CONNECTOR_AGENT_PORT: ${DATA_CONNECTOR_AGENT_PORT}
    ports:
      - "${BEACON_DB_PORT}:${BEACON_DB_PORT}" # postgresql data port
      - "${KEYCLOAK_DB_PORT}:${KEYCLOAK_DB_PORT}" # postgresql keycloak port
      - "${KEYCLOAK_PORT}:${KEYCLOAK_PORT}" # Keycloak
      - "${GRAPHQL_ENGINE_PORT}:${GRAPHQL_ENGINE_PORT}" # graphql engine
      - "${DATA_CONNECTOR_AGENT_PORT}:${DATA_CONNECTOR_AGENT_PORT}" # data-connector-agent
      - "${KEYCLOAK_MANAGEMENT_PORT}:${KEYCLOAK_MANAGEMENT_PORT}" # Keycloak management port

  postgres:
    image: postgres:15
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${BEACON_DB_PASSWORD}
      POSTGRES_USER: ${BEACON_DB_USER}
      POSTGRES_DB: ${BEACON_DB_NAME}
    network_mode: "service:localhost"
    command: -p ${BEACON_DB_PORT}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BEACON_DB_USER} -d ${BEACON_DB_NAME} -p ${BEACON_DB_PORT}"]
      interval: 5s
      timeout: 600s
      retries: 50

  postgres-keycloak:
    image: postgres:15
    container_name: keycloak_postgres
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    network_mode: "service:localhost"
    command: -p ${KEYCLOAK_DB_PORT}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB_NAME} -p ${KEYCLOAK_DB_PORT}"]
      interval: 5s
      timeout: 600s
      retries: 50

  keycloak:
    image: quay.io/keycloak/keycloak:22.0
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: localhost
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_DB_URL_PORT: ${KEYCLOAK_DB_PORT}
      
      KC_HTTP_ENABLED: true
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true
      KC_HTTP_MANAGEMENT_PORT: ${KEYCLOAK_MANAGEMENT_PORT}
    command:
      - start-dev --import-realm --http-port=${KEYCLOAK_PORT}
    volumes:
      - ./realm:/opt/keycloak/data/import
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    network_mode: "service:localhost"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${KEYCLOAK_MANAGEMENT_PORT}/health/ready"]
      interval: 30s
      timeout: 1000s
      retries: 50
      start_period: 10s

  graphql-engine:
    image: hasura/graphql-engine:v2.42.0
    restart: always
    environment:
      HASURA_GRAPHQL_SERVER_PORT: ${GRAPHQL_ENGINE_PORT}
      ## postgres database to store Hasura metadata
      HASURA_GRAPHQL_METADATA_DATABASE_URL: postgres://${BEACON_DB_USER}:${BEACON_DB_PASSWORD}@localhost:${BEACON_DB_PORT}/${BEACON_DB_NAME}
      ## this env var can be used to add the above postgres database to Hasura as a data source. this can be removed/updated based on your needs
      PG_DATABASE_URL: postgres://${BEACON_DB_USER}:${BEACON_DB_PASSWORD}@localhost:${BEACON_DB_PORT}/${BEACON_DB_NAME}
      ## uncomment next line to set an admin secret
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET}
      HASURA_GRAPHQL_METADATA_DEFAULTS: '{"backend_configs":{"dataconnector":{"athena":{"uri":"http://localhost:${DATA_CONNECTOR_AGENT_PORT}/api/v1/athena"},"mariadb":{"uri":"http://localhost:${DATA_CONNECTOR_AGENT_PORT}/api/v1/mariadb"},"mysql8":{"uri":"http://localhost:${DATA_CONNECTOR_AGENT_PORT}/api/v1/mysql"},"oracle":{"uri":"http://localhost:${DATA_CONNECTOR_AGENT_PORT}/api/v1/oracle"},"snowflake":{"uri":"http://localhost:${DATA_CONNECTOR_AGENT_PORT}/api/v1/snowflake"}}}}'
      HASURA_GRAPHQL_JWT_SECRET: '{"type": "RS256", "jwk_url": "http://localhost:${KEYCLOAK_PORT}/realms/beaconGraphQL/protocol/openid-connect/certs", "audience": "hasura"}'
    depends_on:
      data-connector-agent:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    network_mode: "service:localhost"

  data-connector-agent:
    image: hasura/graphql-data-connector:v2.42.0
    restart: always
    environment:
      QUARKUS_LOG_LEVEL: ERROR # FATAL, ERROR, WARN, INFO, DEBUG, TRACE
      ## https://quarkus.io/guides/opentelemetry#configuration-reference
      QUARKUS_OPENTELEMETRY_ENABLED: "false"
      QUARKUS_HTTP_PORT: ${DATA_CONNECTOR_AGENT_PORT}
      ## QUARKUS_OPENTELEMETRY_TRACER_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${DATA_CONNECTOR_AGENT_PORT}/api/v1/athena/health"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy
    network_mode: "service:localhost"

  beacon-loader:
    build:
      context: ./beaconLoader/
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:${BEACON_DB_PORT}/${BEACON_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${BEACON_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${BEACON_DB_PASSWORD}
    volumes:
      # Mount data directory - adjust the path to your data files
      - ./data:/data:ro
    network_mode: "service:localhost"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    # Override the data path if needed:
    # command: ["--beacon.data.path=/data"]

volumes:
  db_data: